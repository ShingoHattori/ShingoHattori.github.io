<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<title>掲示板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== Theme variables ===== */
:root {
  --scale: 1;
  --label-scale: 1;
  --bg: #1a1a2e; --text: #eee;
  --tab-bg: #16213e; --tab-border: #0f3460; --tab-inactive: #8899aa; --tab-active-bg: #0f3460; --tab-active-text: #fff;
  --current-bg1: #0f3460; --current-bg2: #16213e; --current-border: #e94560; --current-label: #e94560;
  --shajo-bg: rgba(233,69,96,0.12); --shajo-border: rgba(233,69,96,0.35);
  --w1-border: #4e9af5; --w1-bg1: #1a1a3e; --w1-bg2: #16213e;
  --w2-border: #45b7aa; --w2-bg1: #1a1a3e; --w2-bg2: #16213e;
  --w3-border: #9b7dcf; --w3-bg1: #1a1a3e; --w3-bg2: #16213e;
  --chip-bg: rgba(255,255,255,0.08);
  --edit-bg: #16213e; --edit-border: #333; --input-border: #444; --input-text: #eee;
  --btn-primary: #e94560; --btn-secondary: #0f3460;
  --row-active: rgba(233,69,96,0.2); --row-num-color: #888;
  --th-bg: #0f3460;
}
:root.light {
  --bg: #f0f2f5; --text: #222;
  --tab-bg: #dde; --tab-border: #bbc; --tab-inactive: #667; --tab-active-bg: #fff; --tab-active-text: #222;
  --current-bg1: #fff; --current-bg2: #f5f5fa; --current-border: #d42; --current-label: #d42;
  --shajo-bg: rgba(212,66,34,0.08); --shajo-border: rgba(212,66,34,0.25);
  --w1-border: #3a7fd5; --w1-bg1: #fff; --w1-bg2: #f5f7fa;
  --w2-border: #2a9a8e; --w2-bg1: #fff; --w2-bg2: #f5faf9;
  --w3-border: #7b5daf; --w3-bg1: #fff; --w3-bg2: #f8f5fa;
  --chip-bg: rgba(0,0,0,0.06);
  --edit-bg: #fff; --edit-border: #ccc; --input-border: #aaa; --input-text: #222;
  --btn-primary: #d42; --btn-secondary: #3a7fd5;
  --row-active: rgba(212,66,34,0.12); --row-num-color: #999;
  --th-bg: #3a7fd5;
}

body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s, color 0.3s; }

/* Tab bar */
.tab-bar { display: flex; background: var(--tab-bg); border-bottom: 2px solid var(--tab-border); }
.tab-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 1rem; font-weight: bold; border: none; background: transparent; color: var(--tab-inactive); transition: all 0.2s; }
.tab-btn.active { color: var(--tab-active-text); background: var(--tab-active-bg); }
.tab-btn:hover { opacity: 0.8; }
.theme-toggle { padding: 8px 14px; cursor: pointer; font-size: 1.2rem; border: none; background: transparent; color: var(--tab-inactive); transition: all 0.2s; }
.theme-toggle:hover { opacity: 0.8; }

/* Panels */
.panel { display: none; flex: 1; overflow: auto; }
.panel.active { display: flex; flex-direction: column; }

/* ===== VIEW PANEL ===== */
#view-panel { padding: 6px; gap: 0; flex-direction: row; }

/* Left: 現在の立ち takes 60% width, full height, vertical text */
.slot.current { width: 60%; flex: none; height: 100%; background: linear-gradient(135deg, var(--current-bg1), var(--current-bg2)); border: 3px solid var(--current-border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; }
.slot.current .slot-label { font-size: calc(2rem * var(--label-scale)); color: var(--current-label); font-weight: bold; opacity: 0.8; margin-bottom: 6px; text-align: center; }
.slot.current .slot-content { display: flex; flex-direction: column; gap: 4px; flex: 1; }

/* 射場 items inside current - horizontal rows, label left, value right */
.shajo-item { flex: 1; min-width: 0; background: var(--shajo-bg); border: 2px solid var(--shajo-border); border-radius: 10px; padding: 4px 16px; display: flex; flex-direction: row; align-items: center; gap: 16px; }
.shajo-item .shajo-label { font-size: calc(1.3rem * var(--label-scale)); opacity: 0.5; white-space: nowrap; min-width: 5em; }
.shajo-item .shajo-value { font-size: calc(clamp(1.5rem, 5vh, 3.5rem) * var(--scale)); word-break: break-word; line-height: 1.2; font-weight: bold; flex: 1; overflow: hidden; }
/* autofit mode */
.autofit .shajo-item .shajo-value { font-size: unset; text-wrap: balance; }
.autofit .shajo-item .shajo-value.has-pipe { word-break: keep-all; overflow-wrap: break-word; }
.autofit .slot-content { font-size: unset; }
.autofit .team-chip { text-wrap: balance; }
.autofit .team-chip.has-pipe { word-break: keep-all; overflow-wrap: break-word; }
.autofit .slot-label { font-size: unset; }

/* Right: 控え column takes 40% width, 3 rows stacked vertically */
.waiting-column { width: 40%; height: 100%; display: flex; flex-direction: column; gap: 4px; padding-left: 6px; }

.slot { border-radius: 10px; padding: 8px 10px; display: flex; flex-direction: column; overflow: hidden; }
.slot-label { font-weight: bold; opacity: 0.7; margin-bottom: 4px; white-space: nowrap; }
/* Each slot's content is a 2x2 grid for the 4 teams - fixed cell sizes */
.slot-content { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); gap: 4px; flex: 1; overflow: hidden; }

/* 控え slots - proportional sizing */
.slot.waiting1 { flex: 3; background: linear-gradient(135deg, var(--w1-bg1), var(--w1-bg2)); border: 2px solid var(--w1-border); }
.slot.waiting1 .slot-label { font-size: calc(1.1rem * var(--label-scale)); color: var(--w1-border); }
.slot.waiting1 .slot-content { font-size: calc(1.4rem * var(--scale)); }

.slot.waiting2 { flex: 2; background: linear-gradient(135deg, var(--w2-bg1), var(--w2-bg2)); border: 2px solid var(--w2-border); }
.slot.waiting2 .slot-label { font-size: calc(1rem * var(--label-scale)); color: var(--w2-border); }
.slot.waiting2 .slot-content { font-size: calc(1.2rem * var(--scale)); }

.slot.waiting3 { flex: 1.5; background: linear-gradient(135deg, var(--w3-bg1), var(--w3-bg2)); border: 2px solid var(--w3-border); }
.slot.waiting3 .slot-label { font-size: calc(0.9rem * var(--label-scale)); color: var(--w3-border); }
.slot.waiting3 .slot-content { font-size: calc(1rem * var(--scale)); }

/* Team name in waiting slots - fill each grid cell, never overflow */
.team-chip { background: var(--chip-bg); border-radius: 6px; padding: 2px 6px; word-break: break-word; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; min-width: 0; min-height: 0; }

/* Navigation hint */
.nav-hint { position: fixed; bottom: 4px; right: 10px; font-size: 0.75rem; opacity: 0.3; }

/* ===== EDIT PANEL ===== */
#edit-panel { padding: 16px; gap: 12px; }
.edit-section { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.edit-section label { font-weight: bold; min-width: 100px; }

.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: opacity 0.2s; }
.btn:hover { opacity: 0.8; }
.btn-primary { background: var(--btn-primary); color: #fff; }
.btn-secondary { background: var(--btn-secondary); color: #fff; }
.btn-small { padding: 6px 12px; font-size: 0.8rem; }

/* Data table */
#data-table-wrapper { flex: 1; overflow: auto; margin-top: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th, td { border: 1px solid var(--edit-border); padding: 6px 8px; text-align: center; }
th { background: var(--th-bg); color: #fff; position: sticky; top: 0; z-index: 1; }
td input { width: 100%; background: transparent; border: 1px solid var(--input-border); color: var(--input-text); padding: 4px; border-radius: 4px; font-size: 0.85rem; text-align: center; }
td input:focus { border-color: var(--btn-primary); outline: none; }
tr.active-row { background: var(--row-active); }
.row-num { width: 40px; color: var(--row-num-color); font-size: 0.8rem; }
.row-actions { width: 60px; }
.drag-handle { width: 30px; cursor: grab; text-align: center; color: var(--row-num-color); font-size: 1.1rem; user-select: none; }
.drag-handle:active { cursor: grabbing; }
tr.drag-over td { border-top: 3px solid var(--btn-primary); }

/* Position indicator */
.position-display { text-align: center; padding: 8px; background: var(--edit-bg); border-radius: 8px; margin-bottom: 8px; }
.position-display span { font-size: 1.2rem; font-weight: bold; color: var(--btn-primary); }

/* ===== SETTINGS PANEL ===== */
.settings-content { padding: 24px; max-width: 500px; }
.settings-content h2 { margin-bottom: 20px; }
.setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.setting-row label { min-width: 140px; font-weight: bold; }
.setting-row input[type="range"] { flex: 1; accent-color: var(--btn-primary); }
.setting-row span { min-width: 50px; text-align: right; font-family: monospace; }
.setting-row select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--edit-bg); color: var(--text); font-size: 0.9rem; }
.setting-hint { margin-top: 20px; padding: 12px 16px; background: var(--chip-bg); border-radius: 8px; line-height: 1.6; }
.setting-hint h3 { margin-bottom: 8px; }
.setting-hint code { background: var(--shajo-bg); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="view">表示</button>
  <button class="tab-btn" data-tab="edit">編集</button>
  <button class="tab-btn" data-tab="settings">設定</button>
  <button class="theme-toggle" id="theme-toggle" title="テーマ切替">🌙</button>
</div>

<div id="view-panel" class="panel active">
  <div class="slot current" id="slot-current">
    <div class="slot-label">現在の立ち</div>
    <div class="slot-content" id="current-content"></div>
  </div>
  <div class="waiting-column">
    <div class="slot waiting1" id="slot-w1">
      <div class="slot-label">第一控え</div>
      <div class="slot-content" id="w1-content"></div>
    </div>
    <div class="slot waiting2" id="slot-w2">
      <div class="slot-label">第二控え</div>
      <div class="slot-content" id="w2-content"></div>
    </div>
    <div class="slot waiting3" id="slot-w3">
      <div class="slot-label">第三控え</div>
      <div class="slot-content" id="w3-content"></div>
    </div>
  </div>
  <div class="nav-hint">← → キーで立ちを切り替え</div>
</div>

<div id="edit-panel" class="panel">
  <div class="position-display">
    現在の位置: <span id="pos-indicator">1</span> / <span id="pos-total">0</span>
  </div>
  <div class="edit-section">
    <button class="btn btn-primary btn-small" id="btn-prev">◀ 前へ</button>
    <button class="btn btn-primary btn-small" id="btn-next">次へ ▶</button>
    <button class="btn btn-secondary btn-small" id="btn-add-row">＋ 行追加</button>
    <button class="btn btn-secondary btn-small" id="btn-import">CSVインポート</button>
    <button class="btn btn-secondary btn-small" id="btn-export">CSVエクスポート</button>
  </div>
  <input type="file" id="file-input" accept=".csv" style="display:none;">
  <div id="data-table-wrapper">
    <table>
      <thead>
        <tr>
          <th class="drag-handle"></th>
          <th class="row-num">#</th>
          <th>第一射場</th>
          <th>第二射場</th>
          <th>第三射場</th>
          <th>第四射場</th>
          <th class="row-actions">操作</th>
        </tr>
      </thead>
      <tbody id="data-tbody"></tbody>
    </table>
  </div>
</div>

<div id="settings-panel" class="panel">
  <div class="settings-content">
    <h2>設定</h2>
    <div class="setting-row">
      <label>チーム名の文字サイズ</label>
      <select id="size-mode">
        <option value="scale">スライダー（手動）</option>
        <option value="autofit">自動フィット（枠に合わせる）</option>
      </select>
    </div>
    <div class="setting-row" id="scale-row">
      <label for="scale-slider">チーム名サイズ</label>
      <input type="range" id="scale-slider" min="0.5" max="2.5" step="0.05" value="1">
      <span id="scale-value">1.00x</span>
      <button class="btn btn-secondary btn-small" id="scale-reset">リセット</button>
    </div>
    <div class="setting-row">
      <label>現在の立ちで | 改行</label>
      <select id="current-pipe-mode">
        <option value="on">有効</option>
        <option value="off">無効（1行表示）</option>
      </select>
    </div>
    <div class="setting-row">
      <label for="label-slider">ラベルサイズ</label>
      <input type="range" id="label-slider" min="0.5" max="2.5" step="0.05" value="1">
      <span id="label-value">1.00x</span>
      <button class="btn btn-secondary btn-small" id="label-reset">リセット</button>
    </div>
    <h2>使い方</h2>
    <div class="setting-hint">
      <p><b>表示タブ</b>: 左に「現在の立ち」、右に控え3つを表示します。</p>
      <p><b>← →キー</b>: 立ちを進める・戻す（音が鳴ります）。</p>
      <p><b>編集タブ</b>: データの追加・削除・並び替え（ドラッグ）ができます。</p>
      <p><b>CSV</b>: インポート・エクスポートに対応。行=立ち、列=射場。</p>
      <p><b>改行ヒント</b>: チーム名に <code>|</code> を入れると、その位置で優先的に改行されます。<br>例: <code>東京慈恵会|医科大学A</code></p>
    </div>
  </div>
</div>

<audio id="tone-audio" src="tone.m4a" preload="auto"></audio>

<script>
// ===== State =====
let data = []; // array of [shajo1, shajo2, shajo3, shajo4]
let currentIndex = 0; // which row is "現在の立ち"
let sizeMode = "scale"; // "scale" or "autofit"
let currentPipeMode = "on"; // "on" or "off"

const STORAGE_KEY = "bulletinboard_data";
const STORAGE_POS_KEY = "bulletinboard_pos";

// ===== Init =====
function init() {
  loadFromStorage();
  if (data.length === 0) {
    data.push(["", "", "", ""]);
  }
  renderView();
  renderTable();
  updatePosIndicator();
  setupEvents();
}

// ===== Storage =====
function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  localStorage.setItem(STORAGE_POS_KEY, String(currentIndex));
}

function loadFromStorage() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(d)) data = d;
    const p = parseInt(localStorage.getItem(STORAGE_POS_KEY));
    if (!isNaN(p)) currentIndex = p;
  } catch(e) {}
}

// ===== View rendering =====
function renderView() {
  renderCurrentSlot();
  renderWaitingSlot("w1", currentIndex + 1);
  renderWaitingSlot("w2", currentIndex + 2);
  renderWaitingSlot("w3", currentIndex + 3);
  requestAnimationFrame(runAutofit);
}

function renderCurrentSlot() {
  const el = document.getElementById("current-content");
  const row = data[currentIndex];
  if (!row) { el.innerHTML = "<span style='opacity:0.4'>データなし</span>"; return; }
  const labels = ["第一射場", "第二射場", "第三射場", "第四射場"];
  const usePipe = currentPipeMode === "on";
  el.innerHTML = row.map((val, i) => {
    const hasPipe = usePipe && val.includes("|");
    const display = usePipe ? formatText(val) : escHtml(val.replace(/\|/g, ""));
    const rawAttr = usePipe ? val : val.replace(/\|/g, "");
    return `<div class="shajo-item"><div class="shajo-label">${labels[i]}</div><div class="shajo-value${hasPipe ? " has-pipe" : ""}" data-raw="${escHtml(rawAttr)}">${display || "—"}</div></div>`;
  }).join("");
}

function renderWaitingSlot(id, index) {
  const el = document.getElementById(id + "-content");
  const row = data[index];
  if (!row) {
    el.innerHTML = [0,1,2,3].map(() => `<span class="team-chip" style="opacity:0.3">—</span>`).join("");
    return;
  }
  // Always show 4 cells in 2x2 grid
  el.innerHTML = row.map(v =>
    `<span class="team-chip${v.includes("|") ? " has-pipe" : ""}" data-raw="${escHtml(v)}">${v.trim() ? formatText(v) : '<span style="opacity:0.3">—</span>'}</span>`
  ).join("");
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Convert | to zero-width space (optional line break point)
function formatText(s) {
  if (!s || !s.trim()) return "";
  return s.split("|").map(part => {
    const d = document.createElement("div");
    d.textContent = part;
    return d.innerHTML;
  }).join("\u200B");
}

// ===== Autofit =====
// Measure text size at a given font-size using an offscreen element
const _measure = document.createElement("span");
_measure.style.cssText = "position:absolute;left:-9999px;top:-9999px;white-space:nowrap;visibility:hidden;font-weight:bold;";
document.body.appendChild(_measure);

function measureText(text, fontSize, fontFamily) {
  _measure.style.fontSize = fontSize + "px";
  _measure.style.fontFamily = fontFamily || "inherit";
  _measure.textContent = text;
  return { w: _measure.offsetWidth, h: _measure.offsetHeight };
}

// Offscreen box for measuring wrapped text
const _measureBox = document.createElement("div");
_measureBox.style.cssText = "position:absolute;left:-9999px;top:-9999px;visibility:hidden;font-weight:bold;word-break:break-word;";
document.body.appendChild(_measureBox);

function measureWrapped(text, fontSize, font, boxW) {
  _measureBox.style.fontSize = fontSize + "px";
  _measureBox.style.fontFamily = font;
  _measureBox.style.width = boxW + "px";
  // Use zero-width space for | so measurement matches rendering
  _measureBox.textContent = text.replace(/\|/g, "\u200B");
  return { h: _measureBox.offsetHeight, lines: Math.round(_measureBox.offsetHeight / (fontSize * 1.2)) };
}

// Calculate the max font size that fits, returns the size (does NOT apply it)
function calcFitSize(text, rawText, font, maxW, maxH, maxLines) {
  maxLines = maxLines || 2;
  if (!text || text === "—") return Math.min(maxH * 0.7, maxW * 0.4);
  const src = rawText || text;

  // If text has |, try forced line break approach (each segment = 1 line)
  if (src.includes("|")) {
    const segments = src.split("|");
    let lo = 4, hi = maxH;
    for (let i = 0; i < 20; i++) {
      const mid = (lo + hi) / 2;
      const totalH = segments.length * mid * 1.3;
      let fits = totalH <= maxH;
      if (fits) {
        for (const seg of segments) {
          const m = measureText(seg, mid, font);
          if (m.w > maxW) { fits = false; break; }
        }
      }
      if (fits) { lo = mid; } else { hi = mid; }
    }
    return Math.floor(lo);
  }

  // No pipe: standard wrapping fit
  let lo = 4, hi = maxH;
  for (let i = 0; i < 20; i++) {
    const mid = (lo + hi) / 2;
    const r = measureWrapped(text, mid, font, maxW);
    if (r.lines > maxLines || r.h > maxH) {
      hi = mid;
    } else {
      lo = mid;
    }
  }
  return Math.floor(lo);
}

// Verify that a given font size actually fits (no overflow)
function verifyFit(text, rawText, font, fontSize, maxW, maxH) {
  const src = rawText || text;
  if (src.includes("|")) {
    const segments = src.split("|");
    const totalH = segments.length * fontSize * 1.3;
    if (totalH > maxH) return false;
    for (const seg of segments) {
      const m = measureText(seg, fontSize, font);
      if (m.w > maxW) return false;
    }
    return true;
  }
  const r = measureWrapped(text, fontSize, font, maxW);
  return r.h <= maxH;
}

function runAutofit() {
  if (sizeMode !== "autofit") return;

  // === 現在の立ち: unify font size across all 4 shajo values ===
  const shajoItems = document.querySelectorAll(".shajo-item");
  const shajoInfo = [];
  shajoItems.forEach(item => {
    const val = item.querySelector(".shajo-value");
    if (!val) return;
    const label = item.querySelector(".shajo-label");
    const labelW = label ? label.offsetWidth + 16 : 0;
    const maxW = item.clientWidth - labelW - 32;
    const maxH = item.clientHeight - 8;
    if (maxW > 0 && maxH > 0) {
      const text = val.textContent.trim();
      const raw = val.dataset.raw || text;
      const font = getComputedStyle(val).fontFamily;
      const size = calcFitSize(text, raw, font, maxW, maxH, 2);
      shajoInfo.push({ el: val, text, raw, font, maxW, maxH, size });
    }
  });
  if (shajoInfo.length > 0) {
    let minSize = Math.min(...shajoInfo.map(s => s.size));
    // Verify the min size fits all items
    for (const s of shajoInfo) {
      while (minSize > 4 && !verifyFit(s.text, s.raw, s.font, minSize, s.maxW, s.maxH)) {
        minSize--;
      }
    }
    shajoInfo.forEach(s => { s.el.style.fontSize = minSize + "px"; });
  }

  // === 各控えスロット: unify font size within each slot's 2x2 grid ===
  document.querySelectorAll(".slot-content").forEach(grid => {
    if (grid.id === "current-content") return;
    const chips = grid.querySelectorAll(".team-chip");
    if (chips.length === 0) return;
    // Reset font first so cells shrink to grid size
    chips.forEach(c => { c.style.fontSize = "8px"; });
    void grid.offsetHeight;
    // Record fixed cell sizes
    const chipInfo = [];
    chips.forEach(chip => {
      const cw = chip.clientWidth - 12;
      const ch = chip.clientHeight - 8;
      if (cw > 0 && ch > 0) {
        const text = chip.textContent.trim();
        const raw = chip.dataset.raw || text;
        const font = getComputedStyle(chip).fontFamily;
        const size = calcFitSize(text, raw, font, cw, ch, 2);
        chipInfo.push({ el: chip, text, raw, font, maxW: cw, maxH: ch, size });
      }
    });
    if (chipInfo.length > 0) {
      let minSize = Math.min(...chipInfo.map(s => s.size));
      for (const s of chipInfo) {
        while (minSize > 4 && !verifyFit(s.text, s.raw, s.font, minSize, s.maxW, s.maxH)) {
          minSize--;
        }
      }
      chipInfo.forEach(s => { s.el.style.fontSize = minSize + "px"; });
    }
  });
}

// ===== Navigation =====
function moveTo(newIndex) {
  if (newIndex < 0 || newIndex >= data.length) return;
  if (newIndex === currentIndex) return;
  currentIndex = newIndex;
  playTone();
  renderView();
  renderTable();
  updatePosIndicator();
  saveToStorage();
}

function playTone() {
  const audio = document.getElementById("tone-audio");
  audio.currentTime = 0;
  audio.play().catch(() => {});
}

// ===== Edit table =====
let dragSrcIndex = null;

function renderTable() {
  const tbody = document.getElementById("data-tbody");
  tbody.innerHTML = "";
  data.forEach((row, ri) => {
    const tr = document.createElement("tr");
    tr.draggable = true;
    tr.dataset.index = ri;
    if (ri === currentIndex) tr.classList.add("active-row");

    // Drag handle
    const tdDrag = document.createElement("td");
    tdDrag.className = "drag-handle";
    tdDrag.textContent = "≡";
    tr.appendChild(tdDrag);

    // Row number
    const tdNum = document.createElement("td");
    tdNum.className = "row-num";
    tdNum.textContent = ri + 1;
    tr.appendChild(tdNum);
    // 4 shajo columns
    for (let ci = 0; ci < 4; ci++) {
      const td = document.createElement("td");
      const input = document.createElement("input");
      input.type = "text";
      input.value = row[ci] || "";
      input.addEventListener("input", () => {
        data[ri][ci] = input.value;
        renderView();
        saveToStorage();
      });
      td.appendChild(input);
      tr.appendChild(td);
    }
    // Actions
    const tdAct = document.createElement("td");
    tdAct.className = "row-actions";
    const delBtn = document.createElement("button");
    delBtn.className = "btn btn-small";
    delBtn.style.cssText = "background:#a33;color:#fff;padding:2px 8px;font-size:0.75rem;";
    delBtn.textContent = "✕";
    delBtn.addEventListener("click", () => {
      if (data.length <= 1) return;
      data.splice(ri, 1);
      if (currentIndex >= data.length) currentIndex = data.length - 1;
      renderView();
      renderTable();
      updatePosIndicator();
      saveToStorage();
    });
    tdAct.appendChild(delBtn);
    tr.appendChild(tdAct);

    // Drag events
    tr.addEventListener("dragstart", (e) => {
      dragSrcIndex = ri;
      tr.style.opacity = "0.4";
      e.dataTransfer.effectAllowed = "move";
    });
    tr.addEventListener("dragend", () => {
      tr.style.opacity = "";
      tbody.querySelectorAll("tr").forEach(r => r.classList.remove("drag-over"));
    });
    tr.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      tbody.querySelectorAll("tr").forEach(r => r.classList.remove("drag-over"));
      tr.classList.add("drag-over");
    });
    tr.addEventListener("drop", (e) => {
      e.preventDefault();
      const dst = ri;
      if (dragSrcIndex === null || dragSrcIndex === dst) return;
      const moved = data.splice(dragSrcIndex, 1)[0];
      data.splice(dst, 0, moved);
      // Update currentIndex to follow the active row
      if (currentIndex === dragSrcIndex) {
        currentIndex = dst;
      } else if (dragSrcIndex < currentIndex && dst >= currentIndex) {
        currentIndex--;
      } else if (dragSrcIndex > currentIndex && dst <= currentIndex) {
        currentIndex++;
      }
      renderView();
      renderTable();
      updatePosIndicator();
      saveToStorage();
    });

    tbody.appendChild(tr);
  });
}

function updatePosIndicator() {
  document.getElementById("pos-indicator").textContent = currentIndex + 1;
  document.getElementById("pos-total").textContent = data.length;
}

// ===== CSV =====
function exportCSV() {
  const lines = data.map(row => row.map(cell => {
    if (cell.includes(",") || cell.includes('"') || cell.includes("\n")) {
      return '"' + cell.replace(/"/g, '""') + '"';
    }
    return cell;
  }).join(","));
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "bulletinboard.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function importCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const rows = parseCSV(text);
    if (rows.length === 0) return;
    data = rows.map(r => {
      // Pad to 4 columns
      while (r.length < 4) r.push("");
      return r.slice(0, 4);
    });
    currentIndex = 0;
    renderView();
    renderTable();
    updatePosIndicator();
    saveToStorage();
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const rows = [];
  let current = [];
  let cell = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i+1] === '"') { cell += '"'; i++; }
        else { inQuotes = false; }
      } else { cell += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { current.push(cell); cell = ""; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i+1] === '\n') i++;
        current.push(cell); cell = "";
        if (current.some(c => c !== "")) rows.push(current);
        current = [];
      } else { cell += ch; }
    }
  }
  current.push(cell);
  if (current.some(c => c !== "")) rows.push(current);
  return rows;
}

// ===== Events =====
function setupEvents() {
  // Tab switching
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab + "-panel").classList.add("active");
    });
  });

  // Arrow keys
  document.addEventListener("keydown", (e) => {
    // Don't intercept when typing in inputs
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown") {
      e.preventDefault();
      moveTo(currentIndex + 1);
    } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
      e.preventDefault();
      moveTo(currentIndex - 1);
    }
  });

  // Edit buttons
  document.getElementById("btn-prev").addEventListener("click", () => moveTo(currentIndex - 1));
  document.getElementById("btn-next").addEventListener("click", () => moveTo(currentIndex + 1));
  document.getElementById("btn-add-row").addEventListener("click", () => {
    data.push(["", "", "", ""]);
    renderTable();
    updatePosIndicator();
    saveToStorage();
    // Scroll to bottom
    const wrapper = document.getElementById("data-table-wrapper");
    wrapper.scrollTop = wrapper.scrollHeight;
  });
  document.getElementById("btn-export").addEventListener("click", exportCSV);
  document.getElementById("btn-import").addEventListener("click", () => {
    document.getElementById("file-input").click();
  });
  document.getElementById("file-input").addEventListener("change", (e) => {
    if (e.target.files[0]) importCSV(e.target.files[0]);
    e.target.value = "";
  });

  // Current pipe mode
  const pipeSelect = document.getElementById("current-pipe-mode");
  const savedPipe = localStorage.getItem("bulletinboard_pipemode");
  if (savedPipe) {
    currentPipeMode = savedPipe;
    pipeSelect.value = savedPipe;
  }
  pipeSelect.addEventListener("change", () => {
    currentPipeMode = pipeSelect.value;
    localStorage.setItem("bulletinboard_pipemode", currentPipeMode);
    document.querySelectorAll(".shajo-value").forEach(el => el.style.fontSize = "");
    renderView();
  });

  // Size mode
  const sizeModeSelect = document.getElementById("size-mode");
  const scaleRow = document.getElementById("scale-row");
  const savedMode = localStorage.getItem("bulletinboard_sizemode");
  if (savedMode) {
    sizeMode = savedMode;
    sizeModeSelect.value = savedMode;
  }
  updateSizeModeUI();
  sizeModeSelect.addEventListener("change", () => {
    sizeMode = sizeModeSelect.value;
    localStorage.setItem("bulletinboard_sizemode", sizeMode);
    updateSizeModeUI();
    // Clear inline font-size when switching away from autofit
    document.querySelectorAll(".shajo-value, .team-chip").forEach(el => el.style.fontSize = "");
    renderView();
  });
  function updateSizeModeUI() {
    scaleRow.style.display = sizeMode === "scale" ? "flex" : "none";
    if (sizeMode === "autofit") {
      document.body.classList.add("autofit");
    } else {
      document.body.classList.remove("autofit");
    }
  }

  // Scale slider
  const scaleSlider = document.getElementById("scale-slider");
  const scaleValue = document.getElementById("scale-value");
  const savedScale = localStorage.getItem("bulletinboard_scale");
  if (savedScale) {
    scaleSlider.value = savedScale;
    document.documentElement.style.setProperty("--scale", savedScale);
    scaleValue.textContent = parseFloat(savedScale).toFixed(2) + "x";
  }
  scaleSlider.addEventListener("input", () => {
    const v = scaleSlider.value;
    document.documentElement.style.setProperty("--scale", v);
    scaleValue.textContent = parseFloat(v).toFixed(2) + "x";
    localStorage.setItem("bulletinboard_scale", v);
  });
  document.getElementById("scale-reset").addEventListener("click", () => {
    scaleSlider.value = 1;
    document.documentElement.style.setProperty("--scale", 1);
    scaleValue.textContent = "1.00x";
    localStorage.setItem("bulletinboard_scale", "1");
  });

  // Label scale slider
  const labelSlider = document.getElementById("label-slider");
  const labelValue = document.getElementById("label-value");
  const savedLabel = localStorage.getItem("bulletinboard_label_scale");
  if (savedLabel) {
    labelSlider.value = savedLabel;
    document.documentElement.style.setProperty("--label-scale", savedLabel);
    labelValue.textContent = parseFloat(savedLabel).toFixed(2) + "x";
  }
  labelSlider.addEventListener("input", () => {
    const v = labelSlider.value;
    document.documentElement.style.setProperty("--label-scale", v);
    labelValue.textContent = parseFloat(v).toFixed(2) + "x";
    localStorage.setItem("bulletinboard_label_scale", v);
    if (sizeMode === "autofit") renderView();
  });
  document.getElementById("label-reset").addEventListener("click", () => {
    labelSlider.value = 1;
    document.documentElement.style.setProperty("--label-scale", 1);
    labelValue.textContent = "1.00x";
    localStorage.setItem("bulletinboard_label_scale", "1");
    if (sizeMode === "autofit") renderView();
  });

  // Theme toggle
  const themeBtn = document.getElementById("theme-toggle");
  if (localStorage.getItem("bulletinboard_theme") === "light") {
    document.documentElement.classList.add("light");
    themeBtn.textContent = "☀️";
  }
  themeBtn.addEventListener("click", () => {
    document.documentElement.classList.toggle("light");
    const isLight = document.documentElement.classList.contains("light");
    themeBtn.textContent = isLight ? "☀️" : "🌙";
    localStorage.setItem("bulletinboard_theme", isLight ? "light" : "dark");
  });
}

init();
window.addEventListener("resize", () => { if (sizeMode === "autofit") renderView(); });
</script>
